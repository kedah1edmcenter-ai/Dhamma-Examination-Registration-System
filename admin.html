<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin System - Kedah</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Segoe UI;background:#eef2f7;margin:0;}
.container{padding:20px;}

.grid{
  display:grid;
  grid-template-columns:2.5fr 1fr;
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

h3{margin-top:0;border-bottom:1px solid #ddd;padding-bottom:6px;}

select,input{
  padding:8px;
  margin:5px 0;
  width:100%;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  padding:8px;
  margin:5px 0;
  width:100%;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

.blue  {background:#1f3c88;color:white;}
.green {background:#27ae60;color:white;}
.red   {background:#c0392b;color:white;}
.orange{background:#e67e22;color:white;}
.purple{background:#6c3483;color:white;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border:1px solid #ddd;padding:6px;}
th{background:#1f3c88;color:white;}

.stats-item{background:#f4f6fb;padding:8px;margin-bottom:6px;border-radius:6px;}

/* ========== MODAL ========== */
.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:1000;
  align-items:center;
  justify-content:center;
}
.modal-overlay.active{display:flex;}

.modal-box{
  background:white;
  border-radius:14px;
  padding:24px;
  width:540px;
  max-width:95vw;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
  position:relative;
  max-height:90vh;
  overflow-y:auto;
}

.modal-box h2{
  margin:0 0 16px 0;
  color:#1f3c88;
  font-size:18px;
  border-bottom:2px solid #e8edf5;
  padding-bottom:10px;
}

.modal-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;font-size:22px;
  cursor:pointer;color:#888;width:auto;margin:0;padding:0;
}
.modal-close:hover{color:#c0392b;}

.field-label{font-size:12px;color:#555;font-weight:700;margin:10px 0 4px;}

.input-row{display:flex;gap:8px;margin-bottom:10px;}
.input-row input{flex:1;margin:0;}
.input-row button{width:auto;padding:8px 18px;margin:0;white-space:nowrap;border-radius:6px;}

/* รายการแอดมิน */
.admin-list{max-height:300px;overflow-y:auto;margin-top:4px;}

.admin-item{
  display:flex;align-items:center;
  justify-content:space-between;
  background:#f4f6fb;border-radius:8px;
  padding:10px 14px;margin-bottom:8px;
  border:1px solid #e8edf5;
}

.admin-info{display:flex;flex-direction:column;gap:3px;}
.admin-username{font-weight:700;color:#1f3c88;font-size:14px;}
.admin-sub{font-size:12px;color:#888;}

.badge{
  font-size:11px;padding:3px 10px;
  border-radius:20px;font-weight:700;white-space:nowrap;
}
.badge-dev  {background:#fdebd0;color:#e67e22;}
.badge-admin{background:#d5e8f8;color:#1f3c88;}

.btn-del{
  background:#c0392b;color:white;border:none;
  border-radius:6px;padding:5px 12px;cursor:pointer;
  font-size:12px;width:auto;margin:0;font-weight:600;
}
.btn-del:disabled{background:#ddd;color:#aaa;cursor:not-allowed;}

.empty-list{text-align:center;color:#aaa;padding:24px;font-size:14px;}

.divider{border:none;border-top:1px solid #eee;margin:14px 0;}
</style>
</head>

<body>

<script>
  // ── Guard: ต้อง login ก่อน ──
  if(localStorage.getItem("adminLogin") !== "true"){
    alert("กรุณาเข้าสู่ระบบก่อน");
    window.location.href = "login.html";
  }
</script>

<div class="container">

  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <div>
      <h2 style="margin:0;">⚙️ Admin Panel</h2>
      <div style="font-size:12px;color:#888;margin-top:3px;">
        เข้าสู่ระบบในฐานะ:
        <b id="currentUserLabel" style="color:#1f3c88;">...</b>
        <span id="currentRoleBadge"></span>
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="purple"
        style="width:auto;padding:9px 18px;border-radius:8px;font-size:14px;"
        onclick="openAdminModal()">
        👤 จัดการแอดมิน
      </button>
      <button class="red" style="width:auto;padding:9px 18px;" onclick="logout()">
        🚪 ออกจากระบบ
      </button>
    </div>
  </div>

  <div class="grid">

    <!-- ===== LEFT ===== -->
    <div>
      <div class="card">
        <h3>🔍 ตัวกรองข้อมูล</h3>
        <select id="schoolFilter"></select>
        <button class="blue" onclick="loadData()">โหลดข้อมูล</button>
      </div>

      <div class="card">
        <h3>📋 รายชื่อ</h3>
        <div style="overflow:auto;max-height:500px;">
          <table id="dataTable"></table>
        </div>
        <button class="red" style="margin-top:10px;" onclick="deleteAll()">🗑 ลบทั้งหมด</button>
      </div>
    </div>

    <!-- ===== RIGHT ===== -->
    <div>
      <div class="card">
        <h3>📊 สถิติ</h3>
        <div id="stats"></div>
      </div>

      <div class="card">
        <h3>📥 Export Excel</h3>
        <select id="exportSchool"></select>
        <select id="exportType">
          <option value="all">ทุกประเภท</option>
          <option value="นักธรรม">นักธรรม</option>
          <option value="ธรรมศึกษา">ธรรมศึกษา</option>
        </select>
        <select id="exportLevel">
          <option value="all">ทุกชั้น</option>
          <option value="ตรี">ตรี</option>
          <option value="โท">โท</option>
          <option value="เอก">เอก</option>
        </select>
        <button class="blue"   onclick="exportFiltered()">Export ตามเงื่อนไข</button>
        <button class="orange" onclick="exportAll()">Export รวม</button>
        <button class="green"  onclick="exportBySchoolAuto()">📦 Export แยก 24 สำนัก</button>
      </div>

      <div class="card">
        <h3>🏫 จัดการสำนักเรียน</h3>
        <input id="newSchool" placeholder="ชื่อสำนักเรียน">
        <button class="green" onclick="addSchool()">➕ เพิ่ม</button>
        <button class="red"   onclick="deleteSchool()">🗑 ลบ</button>
      </div>
    </div>

  </div>
</div>

<!-- ========== MODAL จัดการแอดมิน ========== -->
<div class="modal-overlay" id="adminModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAdminModal()">✕</button>
    <h2>👤 จัดการแอดมิน</h2>

    <!-- ฟอร์มเพิ่ม -->
    <div class="field-label">เพิ่มแอดมินใหม่</div>
    <div class="input-row">
      <input id="newAdminUser" placeholder="Username" autocomplete="off">
      <input id="newAdminPass" placeholder="Password" type="password">
    </div>
    <button class="green" style="margin-bottom:4px;" onclick="addAdmin()">➕ เพิ่มแอดมิน</button>

    <hr class="divider">

    <!-- รายการ -->
    <div class="field-label">รายชื่อแอดมินทั้งหมด</div>
    <div class="admin-list" id="adminList">
      <div class="empty-list">กำลังโหลด...</div>
    </div>
  </div>
</div>

<script type="module">

import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:     "AIzaSyAydvlN3Zb38LugPmpPqMUT7s22CIPUa4w",
  authDomain: "kedah1-edmcenter.firebaseapp.com",
  projectId:  "kedah1-edmcenter"
});
const db = getFirestore(app);

// ════════════════════════════════════════
// 🛡 DEVELOPER — ห้ามลบ ไม่ว่ากรณีใดๆ
// ════════════════════════════════════════
const DEVELOPER_USERNAME = "sirichai";

let students = [];
let schools  = [];
let admins   = [];

// ── แสดงชื่อ + badge ที่ header ──
const currentUser = localStorage.getItem("adminUser") || "";
const currentRole = localStorage.getItem("adminRole") || "admin";

document.getElementById("currentUserLabel").textContent = currentUser || "-";
document.getElementById("currentRoleBadge").innerHTML   =
  currentRole === "developer"
    ? ' <span style="background:#fdebd0;color:#e67e22;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;">🛡 Developer</span>'
    : ' <span style="background:#d5e8f8;color:#1f3c88;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;">Admin</span>';

// ════════════════════════════════════════
// SCHOOLS
// ════════════════════════════════════════
async function loadSchools(){
  const snap = await getDocs(collection(db,"schools"));
  schools = [];
  document.getElementById("schoolFilter").innerHTML = '<option value="all">ทั้งหมด</option>';
  document.getElementById("exportSchool").innerHTML  = '<option value="all">ทุกสำนัก</option>';
  snap.forEach(d=>{
    schools.push({id:d.id,...d.data()});
    const opt = `<option value="${d.id}">${d.data().name}</option>`;
    schoolFilter.innerHTML += opt;
    exportSchool.innerHTML  += opt;
  });
}

// ════════════════════════════════════════
// STUDENTS
// ════════════════════════════════════════
window.loadData = async function(){
  students = [];
  const snap = await getDocs(collection(db,"students"));
  snap.forEach(d => students.push({id:d.id,...d.data()}));
  const f    = schoolFilter.value;
  const data = f==="all" ? students : students.filter(s=>s.schoolId===f);
  renderTable(data);
  renderStats(data);
}

function renderTable(data){
  let html = `<tr>
    <th>#</th><th>คำนำหน้า</th><th>ชื่อ</th><th>นามสกุล</th>
    <th>วัด</th><th>เมือง</th><th>จังหวัด</th><th>ประเทศ</th>
    <th>วันเกิด</th><th>เลขบัตร</th>
    <th>Prefix</th><th>Firstname</th><th>Lastname</th>
    <th>Temple</th><th>City</th><th>Province</th><th>Country</th>
    <th>ลบ</th></tr>`;
  data.forEach((s,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td>${s.prefix_th||""}</td><td>${s.firstname_th||""}</td><td>${s.lastname_th||""}</td>
      <td>${s.temple||""}</td><td>${s.city||""}</td><td>${s.province||""}</td><td>${s.country||""}</td>
      <td>${s.birth||""}</td><td>${s.idcard||""}</td>
      <td>${s.prefix_en||""}</td><td>${s.firstname_en||""}</td><td>${s.lastname_en||""}</td>
      <td>${s.temple_en||""}</td><td>${s.city_en||""}</td><td>${s.province_en||""}</td><td>${s.country_en||""}</td>
      <td><button class="red" style="width:auto;padding:4px 10px;margin:0;"
          onclick="deleteOne('${s.id}')">ลบ</button></td>
    </tr>`;
  });
  document.getElementById("dataTable").innerHTML = html;
}

function getSchool(id){
  const s = schools.find(x=>x.id===id);
  return s ? s.name : "-";
}

window.deleteOne = async function(id){
  if(!confirm("ลบคนนี้?")) return;
  await deleteDoc(doc(db,"students",id));
  loadData();
}

window.deleteAll = async function(){
  if(!confirm("ลบทั้งหมด?")) return;
  await Promise.all(students.map(s=>deleteDoc(doc(db,"students",s.id))));
  students=[];
  renderTable([]);
  renderStats([]);
  alert("ลบหมดแล้ว");
}

// ════════════════════════════════════════
// STATS
// ════════════════════════════════════════
function renderStats(data){
  const r={"นักธรรม":{ตรี:0,โท:0,เอก:0},"ธรรมศึกษา":{ตรี:0,โท:0,เอก:0}};
  data.forEach(s=>{ if(r[s.type]) r[s.type][s.level]++; });
  let html=`รวม: ${data.length} คน<br><br>`;
  for(let t in r){
    html+=`<div class="stats-item"><b>${t}</b><br>
      ตรี:${r[t].ตรี}<br>โท:${r[t].โท}<br>เอก:${r[t].เอก}</div>`;
  }
  stats.innerHTML=html;
}

// ════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════
window.exportFiltered = function(){
  let data=[...students];
  if(exportSchool.value!=="all") data=data.filter(d=>d.schoolId===exportSchool.value);
  if(exportType.value!=="all")   data=data.filter(d=>d.type===exportType.value);
  if(exportLevel.value!=="all")  data=data.filter(d=>d.level===exportLevel.value);
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"DATA");
  XLSX.writeFile(wb,"filtered.xlsx");
}

window.exportAll = function(){
  const ws=XLSX.utils.json_to_sheet(students);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"ALL");
  XLSX.writeFile(wb,"all.xlsx");
}

window.exportBySchoolAuto = function(){
  const group={};
  students.forEach(s=>{
    if(!group[s.schoolId]) group[s.schoolId]=[];
    group[s.schoolId].push(s);
  });
  const wb=XLSX.utils.book_new();
  for(let id in group){
    const ws=XLSX.utils.json_to_sheet(group[id]);
    XLSX.utils.book_append_sheet(wb,ws,getSchool(id));
  }
  XLSX.writeFile(wb,"all_school.xlsx");
}

// ════════════════════════════════════════
// SCHOOL MANAGEMENT
// ════════════════════════════════════════
window.addSchool = async function(){
  if(!newSchool.value.trim()) return;
  await addDoc(collection(db,"schools"),{name:newSchool.value.trim()});
  newSchool.value="";
  loadSchools();
}

window.deleteSchool = async function(){
  if(schoolFilter.value==="all") return;
  if(!confirm("ลบสำนักเรียนนี้?")) return;
  await deleteDoc(doc(db,"schools",schoolFilter.value));
  loadSchools();
}

// ════════════════════════════════════════
// LOGOUT
// ════════════════════════════════════════
window.logout = function(){
  localStorage.removeItem("adminLogin");
  localStorage.removeItem("adminUser");
  localStorage.removeItem("adminRole");
  location.href="login.html";
}

// ════════════════════════════════════════
// ADMIN MODAL
// ════════════════════════════════════════
window.openAdminModal = async function(){
  document.getElementById("adminModal").classList.add("active");
  await renderAdminList();
}

window.closeAdminModal = function(){
  document.getElementById("adminModal").classList.remove("active");
  document.getElementById("newAdminUser").value="";
  document.getElementById("newAdminPass").value="";
}

// คลิกนอก modal ปิด
document.getElementById("adminModal").addEventListener("click",function(e){
  if(e.target===this) closeAdminModal();
});

async function renderAdminList(){
  const el = document.getElementById("adminList");
  el.innerHTML = '<div class="empty-list">กำลังโหลด...</div>';
  try{
    const snap = await getDocs(collection(db,"admins"));
    admins = [];
    snap.forEach(d => admins.push({id:d.id,...d.data()}));

    // ── รวม developer เข้า list เพื่อแสดง (แต่ไม่มี id จาก Firestore) ──
    const devEntry = { id: "__dev__", username: DEVELOPER_USERNAME, role: "developer" };
    const displayList = [devEntry, ...admins.filter(a => a.username !== DEVELOPER_USERNAME)];

    if(displayList.length === 0){
      el.innerHTML = '<div class="empty-list">ยังไม่มีแอดมิน</div>';
      return;
    }

    el.innerHTML = displayList.map(a => {
      const isDev     = a.username === DEVELOPER_USERNAME;
      const isSelf    = a.username === currentUser;
      const canDelete = !isDev; // developer ลบไม่ได้เด็ดขาด

      return `
        <div class="admin-item">
          <div class="admin-info">
            <span class="admin-username">
              ${isDev ? "🛡" : "👤"} ${a.username}
              ${isSelf ? '<span style="font-size:11px;color:#27ae60;">(คุณ)</span>' : ""}
            </span>
            <span class="admin-sub">
              ${isDev ? "ผู้พัฒนาระบบ — เข้าใช้งานได้ทุกเมนู" : "Admin — เข้าใช้งานได้ทุกเมนู"}
            </span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="badge ${isDev ? 'badge-dev' : 'badge-admin'}">
              ${isDev ? "🛡 Developer" : "Admin"}
            </span>
            <button class="btn-del"
              ${!canDelete ? 'disabled title="ผู้พัฒนาระบบ — ไม่สามารถลบได้"' : `onclick="deleteAdmin('${a.id}','${a.username}')"`}>
              ${isDev ? "🔒" : "🗑 ลบ"}
            </button>
          </div>
        </div>`;
    }).join("");

  }catch(err){
    el.innerHTML = `<div class="empty-list" style="color:red;">โหลดไม่สำเร็จ: ${err.message}</div>`;
  }
}

window.addAdmin = async function(){
  const username = document.getElementById("newAdminUser").value.trim();
  const password = document.getElementById("newAdminPass").value.trim();

  if(!username || !password){
    alert("กรุณากรอก Username และ Password ให้ครบ");
    return;
  }

  // ห้ามใช้ชื่อ developer
  if(username === DEVELOPER_USERNAME){
    alert(`❌ ไม่สามารถใช้ชื่อ "${DEVELOPER_USERNAME}" ได้`);
    return;
  }

  // ตรวจซ้ำ
  const exists = admins.find(a => a.username === username);
  if(exists){
    alert(`❌ Username "${username}" มีอยู่แล้ว`);
    return;
  }

  try{
    await addDoc(collection(db,"admins"),{
      username,
      password,
      role: "admin",
      createdAt: new Date().toISOString()
    });
    document.getElementById("newAdminUser").value="";
    document.getElementById("newAdminPass").value="";
    await renderAdminList();
    alert(`✅ เพิ่มแอดมิน "${username}" เรียบร้อยแล้ว`);
  }catch(err){
    alert("เพิ่มไม่สำเร็จ: " + err.message);
  }
}

window.deleteAdmin = async function(id, username){
  // Double-check developer ลบไม่ได้
  if(username === DEVELOPER_USERNAME){
    alert("🔒 ไม่สามารถลบบัญชีผู้พัฒนาระบบได้");
    return;
  }
  if(!confirm(`ลบแอดมิน "${username}" ใช่ไหม?`)) return;
  try{
    await deleteDoc(doc(db,"admins",id));
    await renderAdminList();
    alert(`🗑 ลบแอดมิน "${username}" เรียบร้อย`);
  }catch(err){
    alert("ลบไม่สำเร็จ: " + err.message);
  }
}

// START
loadSchools();

</script>
</body>
</html>
